<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Selection</title>
    <!-- TODO: Import your CSS File here -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <section class="container">
        <form id="characterForm" type="get" action="page3.html">
            <h1>Choose Your Character</h1>
            <fieldset>
                <legend>
                    Choose Your Character
                </legend>
                <div>
                    <input type="radio" id="aria" name="character" value="aria">
                    <label for="aria">Aria, the Warrior: Strong and brave, with the ability to overcome physical obstacles</label>
                </div>
                </fieldset>
                <fieldset>
                <div>
                    <input type="radio" id="eldrin" name="character" value="eldrin">
                    <label for="eldrin">Eldrin, the Mage: Wise and knowledgable, with the power to solve puzzles and cast spells</label>
                </div>
                </fieldset>

                <fieldset>
                <div>
                    <input type="radio" id="tara" name="character" value="tara">
                    <label for="tara">Tara, the Rogue: Quick and cunning, with skills in stealth and persuasion</label>
                </div>
            </fieldset>
            <button type="submit">Continue</button>
        </form>
    </section>
</body>

</html>
