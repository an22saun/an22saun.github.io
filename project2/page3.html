<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quest Begins</title>
    <!-- TODO: Import your CSS File here -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <section class="container">
        <h1>Pack Your Bag</h1>
        <p>Select the supplies you wish to take on your quest.
            Choose wisely, as you can only carry a limited amount.</p>

        <form id="inventoryForm" type="get" action="page4.html">
            <fieldset>
                <legend>Choose a max of 5 items</legend>
                <div>
                    <input type="checkbox" id="Food" name="Food" />
                    <label for="Food">Food</label>
                </div>

                <div>
                    <input type="checkbox" id="Water" name="Water" />
                    <label for="Water">Water</label>
                </div>

                <div>
                    <input type="checkbox" id="Magic Potions" name="Magic Potions" />
                    <label for="Magic Potions">Magic Potions</label>
                </div>

                <div>
                    <input type="checkbox" id="Maps" name="Maps" />
                    <label for="Maps">Maps</label>
                </div>

                <div>
                    <input type="checkbox" id="Sword" name="Sword" />
                    <label for="Sword">Sword</label>
                </div>

                <div>
                    <input type="checkbox" id="Rope" name="Rope" />
                    <label for="Rope">Rope</label>
                </div>

                <div>
                    <input type="checkbox" id="healPlant" name="healPlant" />
                    <label for="healPlant">Heal Plant</label>
                </div>

                <div>
                    <input type="checkbox" id="Lantern" name="Lantern" />
                    <label for="Lantern">Lantern</label>
                </div>

                <div>
                    <input type="checkbox" id="magnifyingGlass" name="magnifyingGlass" />
                    <label for="magnifyingGlass">Magnifying Glass</label>
                </div>
            </fieldset>
            <p>Beware, all your choices have consequences!! Think wisely before you hit continue.</p>
            <button type="submit">Continue</button>
        </form>
    </section>
</body>

</html>
