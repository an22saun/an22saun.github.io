    <h1>Siena info</h1>

    <form id="sienaForm">
        <label for="" emailAddress>Siena College Email:</label>
        <input type="email" id="emailAddress" placeholder="Ener your Siena email" required pattern=".+@siena\.edu"
            title="Please enter a valid Siena College email ending with @siena.edu">

        <label for="sienaID">Siena ID:</label>
        <input type="text" id="sienaID" placeholder="Enter your Siena ID" required pattern="96\d{6}"

        <button id="submit">Submit</button>>
    </form>
