<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />

    <title>Income Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="incomePage.js" defer></script>
</head>

<body>
    <h1>Add Income</h1>
    <form id="incomeForm">
        <label for="sourceName">Income Source Name:</label>
        <input type="text" id="sourceName" required minLength="3" title="Please enter a name that has a length of at least 3">

        <label for="amount">Amount</label>
        <input type="number" id="amount" step="any" required min="0" title="Amount should be more than 0"> 

        <label for="frequency">Frequency</label>
        <select name="frequency" id="frequency">
            <option value="One-time">One-time</option>
            <option value="Monthly">Monthly</option>
            <option value="Bi-weekly">Bi-weekly</option>
            <option value="Yearly">Yearly</option>
        </select>

        <button id="submit">Submit</button>
    </form>
</body>
